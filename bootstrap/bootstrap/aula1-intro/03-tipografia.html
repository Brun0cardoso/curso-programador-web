<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aula 1.3 - Tipografia</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
</head>
<body>
    <main class="container py-5">
        <!--<h1 class="mb-4">Aula 1.3 tipografia no Bootstrap</h1>
        <h2 class="display-1">Título em destaque com display-1</h2>
        <h2 class="display-2">Título em destaque com display-2</h2>
        <h2 class="display-3">Título em destaque com display-3</h2>
        <h2 class="display-4">Título em destaque com display-4</h2>
        <h2 class="display-5">Título em destaque com display-5</h2>-->
        <h2 class="display-6">Título em destaque com display-6</h2>
        
        <!--aplicando peso e estilo para o texto-->
        <p class="fw-bold">Este texto está em negrito com fw-bold.</p>
        <p class="fst-iitalic">Este texto está em itálico com fst-italic</p>

        <!--aplicando alinhamento aos textos-->
        <div class="border rounded p-3 mt-4">
            <p class="text-start mb-1">Texto alinhado a esquerda.</p>
            <p class="text-center mb-1">Texto centralizado.</p>
            <p class="text-end mb-0">Texto alinhado a direita</p>
        </div>

        <!--aplicando small e text-muted ao texto-->
        <p class="small text-muted mt-4">texto auxiliar com destaque visual</p>


 
    </main>
    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
    ></script>
</body>
</html>
